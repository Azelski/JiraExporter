name: Pre-release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build extension
        run: nix develop --command sh -c "pnpm install --frozen-lockfile && pnpm build"

      - name: Package extension
        id: package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          nix develop --command zip -r "jira-exporter-${VERSION}.zip" dist/
          echo "zip_name=jira-exporter-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Create pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Jira Exporter ${{ github.ref_name }}" \
            --prerelease \
            --generate-notes \
            "${{ steps.package.outputs.zip_name }}"
